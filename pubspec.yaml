name: Paymish
description: Paymish User/Agent & Merchant Project

version: 1.0.0+1

environment:
  sdk: ">=3.11.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ">=0.1.2 <2.0.0"
  intl: ">=0.16.0 <0.18.0"
  provider: ">=4.0.1 <7.0.0"
  connectivity_plus: ^7.0.0
  dio: ">=3.0.8 <6.0.0"
  shared_preferences: ">=0.5.10 <3.0.0"
  permission_handler: ^12.0.1
  app_settings: ^7.0.0
  fluttertoast: ^9.0.0
  file_picker: ^10.3.10
  page_indicator: ">=0.3.0 <0.5.0"
  qr_flutter: ">=3.2.0 <5.0.0"
  path_provider: ">=1.6.11 <3.0.0"
  screenshot: ^3.0.0
  image_gallery_saver: ^2.0.3
  image_picker: ^1.2.1
  local_auth: ^3.0.0
  flutter_secure_storage: ^10.0.0
  sqflite: ">=1.3.0 <3.0.0"
  contacts_service: ">=0.4.6 <0.7.0"
  flutter_sim_country_code: ">=0.0.3 <0.2.0"
  libphonenumber: ">=1.0.1 <3.0.0"
  qr_code_scanner: ">=0.0.13 <2.0.0"
  flutter_html: ^3.0.0
  expandable: ">=4.1.4 <6.0.0"
  flutter_typeahead: ^5.2.0
  flutter_slidable: ^4.0.3
  infinite_scroll_pagination: ^5.1.1
  date_format: ">=1.0.8 <3.0.0"
  firebase_core: ^4.4.0
  firebase_messaging: ^16.1.1
  device_info_plus: ^12.3.0
  geolocator: ^14.0.2
  flutter_local_notifications: ^18.0.1
  flutter_app_badger: ^1.1.2
  flutter_native_timezone: ">=1.0.4 <3.0.0"
  socket_io_client: ^3.1.4
  collection: ^1.14.13
  flutter_paystack: ^1.0.3+1


  http_parser: any
  path: any
dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/fonts/

  fonts:
    - family: SFMonoMedium
      fonts:
        - asset: assets/fonts/SFMonoMedium.otf
    - family: CovesBold
      fonts:
        - asset: assets/fonts/CovesBold700.otf
    - family: CovesLight
      fonts:
        - asset: assets/fonts/CovesLight300.otf
    - family: CovesExtraLight
      fonts:
        - asset: assets/fonts/CovesLight.otf
    - family: PoppinsLight
      fonts:
        - asset: assets/fonts/PoppinsLight.ttf
    - family: PoppinsMedium
      fonts:
        - asset: assets/fonts/PoppinsMedium.ttf
    - family: PoppinsRegular
      fonts:
        - asset: assets/fonts/PoppinsRegular.ttf
    - family: RobotoLight
      fonts:
        - asset: assets/fonts/RobotoLight.ttf
